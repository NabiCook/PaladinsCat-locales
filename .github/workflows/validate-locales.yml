name: Validate locale packs

on:
  pull_request:
    paths:
      - "locales/**"
      - "scripts/validate-locales.mjs"
  push:
    branches: [main]
    paths:
      - "locales/**"
      - "scripts/validate-locales.mjs"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate-locales.mjs
