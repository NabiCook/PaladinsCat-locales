name: Validate localization tooling and locale packs

on:
  pull_request:
    paths:
      - "locales/**"
      - "game-client/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tolgee.config.cjs"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "locales/**"
      - "game-client/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tolgee.config.cjs"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate
