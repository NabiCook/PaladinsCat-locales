name: Validate localization tooling and locale packs

on:
  pull_request:
    paths:
      - "locales/**"
      - "game-client/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate-locales.yml"
  push:
    branches: [main]
    paths:
      - "locales/**"
      - "game-client/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate-locales.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run validate
      - run: npm run test:l10n
